name: Build SleepTimer Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version to 0.0.0
        run: npm version 0.0.0 --no-git-tag-version

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SleepTimerPro-Windows
          path: dist/SleepTimer-Pro-Setup-0.0.0.exe
          retention-days: 30
          if-no-files-found: error
          compression-level: 0
