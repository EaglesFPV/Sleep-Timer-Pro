name: Release SleepTimer Pro

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex: 2.0.3)'
        required: true

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version
        run: npm version --no-git-tag-version ${{ github.event.inputs.version }}

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: SleepTimer Pro v${{ github.event.inputs.version }}
          files: |
            dist/SleepTimer Pro Setup ${{ github.event.inputs.version }}.exe
            dist/SleepTimer Pro ${{ github.event.inputs.version }}.exe
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
